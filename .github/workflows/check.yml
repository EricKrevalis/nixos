name: check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # flakes enabled by default with this installer
      - uses: DeterminateSystems/nix-installer-action@main

      # evaluates every host, catches type errors and bad options without building. this
      # covers the whole core/ engine too, since the real hosts import it. the starter flake
      # in core/ cannot be checked here, it fails on purpose until a hardware config exists.
      - name: evaluate flake
        run: nix flake check --no-build
